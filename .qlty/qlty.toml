#
# For a guide to configuration, visit https://qlty.sh/d/config
# Or for a full reference, visit https://qlty.sh/d/qlty-toml
config_version = "0"

exclude_patterns = [
  "**/build/**",
  "**/cache/**",
  "**/dist/**",
  "**/generated/**",
  "**/node_modules/**",
  "**/testdata/**",
  "**/vendor/**",
]

test_patterns = [
  "**/test/**",
  "**/spec/**",
  "**/*.test.*",
  "**/*.spec.*",
  "**/*_test.*",
  "**/*_spec.*",
  "**/test_*.*",
  "**/spec_*.*",
]

# [smells] mode controls Qlty Cloud PR-comment behavior (post findings as
# review comments). The CLI invocations from CI are governed by the workflow
# step's own flags, not this key.
[smells]
mode = "comment"

[[source]]
name = "default"
default = true


[[plugin]]
name = "actionlint"

[[plugin]]
name = "bandit"

[[plugin]]
name = "gofmt"

# golangci-lint omitted: duplicates revive + staticcheck already in CI

[[plugin]]
name = "osv-scanner"

[[plugin]]
name = "radarlint-go"
mode = "monitor"

[[plugin]]
name = "radarlint-python"
mode = "comment"

[[plugin]]
name = "ripgrep"
mode = "comment"

[[plugin]]
name = "rubocop"
drivers = [
  "lint",
]

[[plugin]]
name = "ruff"
drivers = [
  "lint",
]

[[plugin]]
name = "shellcheck"

[[plugin]]
name = "trufflehog"

[[plugin]]
name = "zizmor"
